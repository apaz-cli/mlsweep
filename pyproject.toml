[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mlsweep"
version = "1.0.0"
requires-python = ">=3.10"
dependencies = []

[project.scripts]
mlsweep_run    = "mlsweep.run_sweep:main"
mlsweep_server = "mlsweep.server:main"
mlsweep_viz    = "mlsweep.visualize:main"

[tool.setuptools.packages.find]
where = [""]
include = ["mlsweep*"]

[tool.mypy]
python_version = "3.10"
strict = false
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
